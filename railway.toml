[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["java"]

[deploy]
startCommand = "find /nix -name 'javac' 2>/dev/null | head -1 | xargs -I{} dirname {} | xargs -I{} env PATH={}:$PATH sh -c 'javac -d out -sourcepath src $(find src -name \"*.java\") && java -cp out com.hotel.oop.HotelServerApp'"

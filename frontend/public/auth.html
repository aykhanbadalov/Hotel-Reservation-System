<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hotel OOP — Sign in</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="h-full bg-slate-50 font-sans text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
<div class="mx-auto flex min-h-full max-w-lg flex-col px-4 py-10">
    <div class="mb-8 text-center">
        <p class="text-xs font-semibold uppercase tracking-widest text-teal-600 dark:text-teal-400">Aurora Grand Hotel</p>
        <h1 class="mt-2 text-2xl font-bold">Guest account</h1>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Sign up or log in to book a room</p>
    </div>

    <div class="flex rounded-xl border border-slate-200 bg-white p-1 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <button type="button" id="tabLogin"
                class="flex-1 rounded-lg py-2 text-sm font-semibold text-teal-700 dark:text-teal-300">Login
        </button>
        <button type="button" id="tabSignup"
                class="flex-1 rounded-lg py-2 text-sm font-medium text-slate-500 dark:text-slate-400">Sign up
        </button>
    </div>

    <div id="panelLogin" class="mt-6 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <form id="formLogin" class="space-y-4">
            <label class="block text-sm font-medium">Email
                <input name="email" type="email" required
                       class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <label class="block text-sm font-medium">Password
                <input name="password" type="password" required
                       class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <p id="loginErr" class="text-sm text-red-600 dark:text-red-400"></p>
            <button type="submit" class="w-full rounded-lg bg-teal-600 py-2.5 text-sm font-semibold text-white hover:bg-teal-500">
                Continue to hotel
            </button>
        </form>
    </div>

    <div id="panelSignup" class="mt-6 hidden rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <form id="formSignup" class="space-y-4">
            <label class="block text-sm font-medium">Full name
                <input name="fullName" type="text" required
                       class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <label class="block text-sm font-medium">Email
                <input name="email" type="email" required
                       class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <label class="block text-sm font-medium">Password
                <input name="password" type="password" required minlength="4"
                       class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <label class="block text-sm font-medium">Confirm password
                <input name="confirmPassword" type="password" required
                       class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <p id="signupErr" class="text-sm text-red-600 dark:text-red-400"></p>
            <button type="submit" class="w-full rounded-lg bg-teal-600 py-2.5 text-sm font-semibold text-white hover:bg-teal-500">
                Create account
            </button>
        </form>
    </div>

    <div class="mt-10 border-t border-slate-200 pt-8 dark:border-slate-800">
        <p class="text-center text-sm text-slate-500 dark:text-slate-400">Staff access</p>
        <button type="button" id="openAdminModal"
                class="mt-3 w-full rounded-lg border border-slate-300 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-800">
            Admin login
        </button>
    </div>

</div>

<div id="adminModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="w-full max-w-sm rounded-2xl border border-slate-200 bg-white p-6 shadow-xl dark:border-slate-700 dark:bg-slate-900">
        <h2 class="text-lg font-semibold">Admin sign in</h2>
        <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Password only (demo: <code class="rounded bg-slate-100 px-1 dark:bg-slate-800">admin123</code>)</p>
        <form id="formAdmin" class="mt-4 space-y-3">
            <label class="block text-sm font-medium">Password
                <input name="password" type="password" required autocomplete="off"
                       class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <p id="adminErr" class="text-sm text-red-600 dark:text-red-400"></p>
            <div class="flex gap-2">
                <button type="button" id="closeAdminModal" class="flex-1 rounded-lg border border-slate-200 py-2 text-sm dark:border-slate-600">Cancel</button>
                <button type="submit" class="flex-1 rounded-lg bg-slate-900 py-2 text-sm font-semibold text-white dark:bg-teal-600">Enter dashboard</button>
            </div>
        </form>
    </div>
</div>

<script src="api-client.js"></script>
<script>
    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');
    const panelLogin = document.getElementById('panelLogin');
    const panelSignup = document.getElementById('panelSignup');

    function showLogin() {
        panelLogin.classList.remove('hidden');
        panelSignup.classList.add('hidden');
        tabLogin.className = 'flex-1 rounded-lg py-2 text-sm font-semibold text-teal-700 dark:text-teal-300';
        tabSignup.className = 'flex-1 rounded-lg py-2 text-sm font-medium text-slate-500 dark:text-slate-400';
    }

    function showSignup() {
        panelLogin.classList.add('hidden');
        panelSignup.classList.remove('hidden');
        tabSignup.className = 'flex-1 rounded-lg py-2 text-sm font-semibold text-teal-700 dark:text-teal-300';
        tabLogin.className = 'flex-1 rounded-lg py-2 text-sm font-medium text-slate-500 dark:text-slate-400';
    }

    tabLogin.addEventListener('click', showLogin);
    tabSignup.addEventListener('click', showSignup);

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('loginErr').textContent = '';
        const fd = new FormData(e.target);
        try {
            const data = await hotelFetchJson(`${API}/auth/login`, {
                method: 'POST',
                body: JSON.stringify({
                    email: fd.get('email'),
                    password: fd.get('password'),
                }),
            }, 'none');
            saveGuestSession(data.token, data.guest);
            window.location.href = 'index.html';
        } catch (err) {
            document.getElementById('loginErr').textContent = err.message;
        }
    });

    document.getElementById('formSignup').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('signupErr').textContent = '';
        const fd = new FormData(e.target);
        try {
            const data = await hotelFetchJson(`${API}/auth/signup`, {
                method: 'POST',
                body: JSON.stringify({
                    fullName: fd.get('fullName'),
                    email: fd.get('email'),
                    password: fd.get('password'),
                    confirmPassword: fd.get('confirmPassword'),
                }),
            }, 'none');
            saveGuestSession(data.token, data.guest);
            window.location.href = 'index.html';
        } catch (err) {
            document.getElementById('signupErr').textContent = err.message;
        }
    });

    const adminModal = document.getElementById('adminModal');
    document.getElementById('openAdminModal').addEventListener('click', () => {
        adminModal.classList.remove('hidden');
        adminModal.classList.add('flex');
    });
    document.getElementById('closeAdminModal').addEventListener('click', () => {
        adminModal.classList.add('hidden');
        adminModal.classList.remove('flex');
    });

    document.getElementById('formAdmin').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('adminErr').textContent = '';
        const fd = new FormData(e.target);
        try {
            const data = await hotelFetchJson(`${API}/auth/admin-login`, {
                method: 'POST',
                body: JSON.stringify({ password: fd.get('password') }),
            }, 'none');
            saveAdminSession(data.token);
            window.location.href = 'admin.html';
        } catch (err) {
            document.getElementById('adminErr').textContent = err.message;
        }
    });

    if (new URLSearchParams(window.location.search).get('admin') === '1') {
        document.getElementById('openAdminModal').click();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hotel OOP — Guest</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="h-full bg-slate-50 font-sans text-slate-900 antialiased transition-colors dark:bg-slate-950 dark:text-slate-100">
<header class="border-b border-slate-200 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-900/80">
    <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4">
        <div>
            <h1 class="text-xl font-bold">Aurora Grand Hotel</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">Search rooms and submit booking requests from your authenticated account</p>
        </div>
        <div class="flex flex-wrap items-center gap-2 sm:gap-3">
            <span id="sessionLabel" class="hidden max-w-[200px] truncate text-sm text-slate-600 dark:text-slate-300"></span>
            <a href="history.html"
               class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">Booking history</a>
            <a href="favorites.html"
               class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">Favorites</a>
            <button id="btnLogout" type="button" class="hidden rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">Log out</button>
            <a id="linkAdminHeader" href="auth.html?admin=1"
               class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">Admin</a>
            <button id="themeToggle" type="button"
                    class="rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800 dark:bg-teal-600 dark:hover:bg-teal-500">
                Change theme
            </button>
        </div>
    </div>
</header>

<main class="mx-auto max-w-6xl space-y-10 px-4 py-8">
    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <h2 class="text-lg font-semibold">Find a room</h2>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Pass dates to filter <em>available</em> rooms and see Strategy-based totals (weekend check-in uses a higher multiplier).</p>
        <form id="searchForm" class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
            <label class="block text-sm font-medium">Keyword
                <input name="q" type="text" placeholder="101, skyline…"
                       class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <label class="block text-sm font-medium">Room type
                <select name="type"
                        class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950">
                    <option value="">Any</option>
                    <option value="STANDARD">Standard</option>
                    <option value="SUITE">Suite</option>
                </select>
            </label>
            <label class="block text-sm font-medium">Min guests
                <input name="minGuests" type="number" min="1" placeholder="2"
                       class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <label class="block text-sm font-medium">Check-in
                <input name="checkIn" type="date"
                       class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <label class="block text-sm font-medium sm:col-span-2 lg:col-span-1">Check-out
                <input name="checkOut" type="date"
                       class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"/>
            </label>
            <div class="flex items-end sm:col-span-2 lg:col-span-1">
                <button type="submit"
                        class="w-full rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-teal-500">
                    Search
                </button>
            </div>
        </form>
    </section>

    <p id="status" class="text-sm text-slate-500 dark:text-slate-400"></p>
    <section id="results" class="grid gap-6 md:grid-cols-2"></section>
</main>

<script src="api-client.js"></script>
<script src="app.js"></script>
<script>
    async function protectIndexPage() {
        const s = requireGuestSessionOrRedirect();
        if (!s) return false;
        try {
            await hotelFetchJson(`${API}/auth/me`, {}, 'guest');
            return true;
        } catch (_) {
            clearGuestSession();
            window.location.href = 'auth.html';
            return false;
        }
    }

    function refreshSessionUi() {
        const s = getGuestSession();
        const label = document.getElementById('sessionLabel');
        const logout = document.getElementById('btnLogout');
        const adminLink = document.getElementById('linkAdminHeader');
        if (s && s.guest) {
            label.textContent = 'Hi, ' + s.guest.fullName;
            label.classList.remove('hidden');
            logout.classList.remove('hidden');
            adminLink.classList.add('hidden');
        } else {
            label.classList.add('hidden');
            logout.classList.add('hidden');
            adminLink.classList.remove('hidden');
        }
    }
    document.addEventListener('DOMContentLoaded', async () => {
        const ok = await protectIndexPage();
        if (!ok) return;
        refreshSessionUi();
    });
    document.getElementById('btnLogout').addEventListener('click', async () => {
        try {
            await hotelFetchJson(`${API}/auth/logout`, { method: 'POST', body: '{}' }, 'guest');
        } catch (_) { /* ignore */ }
        clearGuestSession();
        refreshSessionUi();
        window.location.href = 'auth.html';
    });
    document.getElementById('themeToggle').addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
    }
</script>
</body>
</html>

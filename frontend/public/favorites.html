<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hotel OOP — Favorites</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="h-full bg-slate-50 font-sans text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
<header class="border-b border-slate-200 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-900/80">
    <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4">
        <div>
            <h1 class="text-xl font-bold">Favorite rooms</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">Rooms you marked for quick access.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
            <a href="index.html" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">Rooms</a>
            <a href="history.html" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">History</a>
            <button id="themeToggle" type="button"
                    class="rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800 dark:bg-teal-600 dark:hover:bg-teal-500">
                Change theme
            </button>
            <button id="btnLogout" type="button" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">Log out</button>
        </div>
    </div>
</header>
<main class="mx-auto max-w-6xl px-4 py-8">
    <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="flex items-center justify-between gap-3">
            <h2 class="text-lg font-semibold">Favorites list</h2>
            <button id="refreshFavoritesBtn" type="button" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">Refresh</button>
        </div>
        <p id="favoritesStatus" class="mt-3 text-sm text-slate-500 dark:text-slate-400"></p>
        <div class="mt-4 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <table class="min-w-full divide-y divide-slate-200 text-sm dark:divide-slate-800">
                <thead class="bg-slate-50 text-left text-xs font-semibold uppercase text-slate-500 dark:bg-slate-800/60 dark:text-slate-400">
                <tr>
                    <th class="px-4 py-3">Room</th>
                    <th class="px-4 py-3">Type</th>
                    <th class="px-4 py-3">Guests</th>
                    <th class="px-4 py-3 text-right">Rate</th>
                    <th class="px-4 py-3 text-right">Actions</th>
                </tr>
                </thead>
                <tbody id="favoritesRows" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
            </table>
        </div>
    </section>
</main>
<script src="api-client.js"></script>
<script src="app.js"></script>
<script>
    async function protectFavoritesPage() {
        const s = requireGuestSessionOrRedirect();
        if (!s) return false;
        try {
            await hotelFetchJson(`${API}/auth/me`, {}, 'guest');
            return true;
        } catch (_) {
            clearGuestSession();
            window.location.href = 'auth.html';
            return false;
        }
    }

    document.getElementById('btnLogout').addEventListener('click', async () => {
        try {
            await hotelFetchJson(`${API}/auth/logout`, { method: 'POST', body: '{}' }, 'guest');
        } catch (_) { /* ignore */ }
        clearGuestSession();
        window.location.href = 'auth.html';
    });

    document.addEventListener('DOMContentLoaded', async () => {
        const ok = await protectFavoritesPage();
        if (!ok) return;
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
        loadFavoritesPage();
        document.getElementById('refreshFavoritesBtn').addEventListener('click', loadFavoritesPage);
    });
</script>
</body>
</html>
